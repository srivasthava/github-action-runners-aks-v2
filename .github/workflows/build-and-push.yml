name: Build and Push Runner Images

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - ".github/workflows/build-and-push.yml"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      runner_version:
        description: "GitHub Actions Runner version (e.g. 2.321.0)"
        required: false
        default: "2.321.0"
      push_latest:
        description: "Also tag as latest"
        required: false
        default: "true"
        type: boolean

env:
  REGISTRY: ghcr.io
  LINUX_IMAGE: ghcr.io/srivasthava/arc-linux-runner
  WINDOWS_IMAGE: ghcr.io/srivasthava/arc-windows-runner

jobs:
  #─────────────────────────────────────────────────────────────────────────────
  # Linux Runner Image (built on ubuntu-latest)
  #─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build & Push Linux Runner
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.LINUX_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || inputs.push_latest == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/linux
          file: docker/linux/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNNER_VERSION=${{ inputs.runner_version || '2.321.0' }}
          cache-from: type=gha,scope=linux
          cache-to: type=gha,mode=max,scope=linux
          platforms: linux/amd64

      - name: Update linux-values.yaml
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE="${{ env.LINUX_IMAGE }}:${{ steps.version.outputs.version }}"
          sed -i "s|image:.*arc-linux-runner:.*|image: \"$IMAGE\"|" helm/linux-values.yaml
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add helm/linux-values.yaml
          git diff --cached --quiet || git commit -m "ci: update linux runner image to ${{ steps.version.outputs.version }}"
          git push

      - name: Summary
        run: |
          echo "### Linux Image Published" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  #─────────────────────────────────────────────────────────────────────────────
  # Windows Runner Image (must build on a Windows runner)
  #─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build & Push Windows Runner
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WINDOWS_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || inputs.push_latest == 'true' }}

      # Windows images cannot use Buildx/BuildKit — use plain docker build
      - name: Build Windows image
        run: |
          docker build `
            --build-arg RUNNER_VERSION=${{ inputs.runner_version || '2.321.0' }} `
            -t ${{ env.WINDOWS_IMAGE }}:${{ steps.version.outputs.version }} `
            -f docker/windows/Dockerfile `
            docker/windows

      - name: Push all tags
        shell: pwsh
        run: |
          $tags = @("${{ steps.meta.outputs.tags }}" -split "`n")
          foreach ($tag in $tags) {
            $tag = $tag.Trim()
            if ($tag) {
              docker tag "${{ env.WINDOWS_IMAGE }}:${{ steps.version.outputs.version }}" $tag
              docker push $tag
            }
          }

      - name: Update windows-values.yaml
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $image = "${{ env.WINDOWS_IMAGE }}:${{ steps.version.outputs.version }}"
          $content = Get-Content helm/windows-values.yaml -Raw
          $content = $content -replace 'image:.*arc-windows-runner:.*', "image: `"$image`""
          Set-Content helm/windows-values.yaml -Value $content -NoNewline
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add helm/windows-values.yaml
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "ci: update windows runner image to ${{ steps.version.outputs.version }}"
            git push
          }

      - name: Summary
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY "### Windows Image Published"
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
          Add-Content $env:GITHUB_STEP_SUMMARY "${{ steps.meta.outputs.tags }}"
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
