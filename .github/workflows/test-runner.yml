name: Test ARC Runner

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/test-runner.yml"

jobs:
  test-linux-runner:
    name: Test Linux ARC Runner
    runs-on: arc-runner-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System info
        run: |
          echo "=== Host ==="
          uname -a
          echo "=== User ==="
          whoami
          echo "=== CPU ==="
          nproc
          echo "=== Memory ==="
          free -h
          echo "=== Disk ==="
          df -h /

      - name: Node.js version
        run: node --version

      - name: Docker available
        run: |
          if docker info >/dev/null 2>&1; then
            echo "Docker is available"
            docker version
          else
            echo "Docker not available (DinD disabled or not privileged)"
          fi

      - name: Run a simple build task
        run: |
          echo "Building a sample artifact..."
          mkdir -p dist
          echo "Build: $(date)" > dist/output.txt
          echo "Runner: $RUNNER_NAME" >> dist/output.txt
          echo "Workflow: $GITHUB_WORKFLOW" >> dist/output.txt
          cat dist/output.txt
          echo "Build complete!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: dist/output.txt
          retention-days: 1
