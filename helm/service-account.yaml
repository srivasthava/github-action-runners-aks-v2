#===============================================================================
# Linux Runner Service Account (github-runners namespace)
# Note: Controller SA/ClusterRole/ClusterRoleBinding are managed by Helm chart.
#===============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-runner-sa
  namespace: github-runners
imagePullSecrets:
  - name: ghcr-pull-secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-runner-role
  namespace: github-runners
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-runner-rolebinding
  namespace: github-runners
subjects:
  - kind: ServiceAccount
    name: github-runner-sa
    namespace: github-runners
roleRef:
  kind: Role
  name: github-runner-role
  apiGroup: rbac.authorization.k8s.io
---
#===============================================================================
# Windows Runner Service Account (github-runners-windows namespace)
#===============================================================================
apiVersion: v1
