#===============================================================================
# Controller Service Account (github-controller namespace)
# ARC v2 Helm chart auto-creates this. Defined here for visibility/override.
#===============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: arc-gha-rs-controller
  namespace: github-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: arc-gha-rs-controller
rules:
  - apiGroups: ["actions.github.com"]
    resources: ["autoscalingrunnersets", "autoscalinglisteners", "ephemeralrunnersets", "ephemeralrunners"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["actions.github.com"]
    resources: ["autoscalingrunnersets/status", "autoscalinglisteners/status", "ephemeralrunnersets/status", "ephemeralrunners/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["actions.github.com"]
    resources: ["autoscalingrunnersets/finalizers", "autoscalinglisteners/finalizers", "ephemeralrunnersets/finalizers", "ephemeralrunners/finalizers"]
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: arc-gha-rs-controller
subjects:
  - kind: ServiceAccount
    name: arc-gha-rs-controller
    namespace: github-controller
roleRef:
  kind: ClusterRole
  name: arc-gha-rs-controller
  apiGroup: rbac.authorization.k8s.io
---
#===============================================================================
# Linux Runner Service Account (github-runners namespace)
#===============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-runner-sa
  namespace: github-runners
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-runner-role
  namespace: github-runners
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-runner-rolebinding
  namespace: github-runners
subjects:
  - kind: ServiceAccount
    name: github-runner-sa
    namespace: github-runners
roleRef:
  kind: Role
  name: github-runner-role
  apiGroup: rbac.authorization.k8s.io
---
#===============================================================================
